[DEFAULTS]

# Training-loop defaults read by lora_train.py / underfit.training.loop.
# The dashboard overrides most of these per-run via CLI flags; this file
# fills in anything not explicitly passed. Mirrors the format the original
# stable-audio-tools used so backend code that expects these keys keeps
# working.

# Name of the run (dashboard overrides via --name)
name = underfit-run

# Name of the project
project = None

# Batch size (dashboard overrides via --batch-size)
batch_size = 1

# Resume training from latest checkpoint if true
recover = false

# Save top K model checkpoints during training (-1 = keep all)
save_top_k = -1

# Number of nodes
num_nodes = 1

# Multi-GPU strategy
strategy = "auto"

# Precision: "16-mixed" / "bf16-mixed" / "32-true"
precision = "16-mixed"

# DataLoader workers
num_workers = 6

# Random seed
seed = 42

# Gradient accumulation steps
accum_batches = 1

# Steps between checkpoints (dashboard overrides via --checkpoint-every)
checkpoint_every = 1000

# Steps between validation runs (-1 = never)
val_every = -1

# Trainer checkpoint to restart from (set by dashboard for resume)
ckpt_path = ''

# Pretrained model checkpoint for a fresh run
pretrained_ckpt_path = ''

# Pretransform checkpoint (if separate from main checkpoint)
pretransform_ckpt_path = ''

# Model config (set per-run by the dashboard)
model_config = ''

# Dataset config (set per-run by the dashboard)
dataset_config = ''

# Validation dataset config
val_dataset_config = ''

# Save dir for run outputs (set per-run by the dashboard)
save_dir = ''

# Gradient clip value (0.0 disables clipping)
gradient_clip_val = 0.0

# Remove the weight norm from the pretransform model
remove_pretransform_weight_norm = ''

# Logger ('wandb' or 'tensorboard'); underfit's training loop logs to the
# dashboard regardless — this is for backend code that still checks the key.
logger = 'tensorboard'

# Max training steps (effectively unlimited unless overridden via --max-steps)
max_steps = 10000000000
